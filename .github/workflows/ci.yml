# Workflow GitHub Actions pour le projet MLOps Laplace Immo.
# 3 jobs : lint (qualite de code), test (Pytest), docker-build (image Docker).
# Le job docker-build n'est lance que si lint ET test passent au vert.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation de black et flake8
        run: pip install flake8==7.1.1 black==24.10.0

      - name: Verification du formatage avec black
        run: black --check src/ api/ tests/

      - name: Linting avec flake8
        run: flake8 src/ api/ tests/

  test:
    name: Tests Pytest avec couverture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dependances
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Execution des tests avec couverture
        run: pytest tests/ --cov=src --cov=api --cov-report=term

  docker-build:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image (sans push vers un registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: laplace-immo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
